name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/animated-snake-game@v4
        with:
          github_user_name: soterfernandes
          outputs_path: dist

      - run: mkdir -p output && cp dist/github-contribution-grid-snake.svg output/

      - uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update contribution snake"
